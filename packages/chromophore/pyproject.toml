[project]
name = "chromophore"
version = "0.1.0"
description = "Cross-framework colourmap toolkit — load, convert, preview"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Nicolas Bader", email = "nico.bader@icloud.com" }]

dependencies = [
    "matplotlib>=3.9",
]

[project.optional-dependencies]
plotly   = ["plotly>=5.24"]
crameri  = ["cmcrameri>=1.9"]
cmasher  = ["cmasher>=1.6"]
colorcet = ["colorcet>=3.0"]
all      = [
    "plotly>=5.24",
    "cmcrameri>=1.9",
    "cmasher>=1.6",
    "colorcet>=3.0",
]

[project.urls]
Repository = "https://github.com/nfb2021/polychromae"

[build-system]
requires = ["uv_build>=0.6"]
build-backend = "uv_build"

