[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
  "mkdocstrings-python>=2.0.5",
  "pytest>=9.1.1",
  "pytest-cov>=7",
  "ruff>=0.15.18",
  "ty>=0.0.52",
  "zensical>=0.0.46",
]

[tool.ruff]
line-length = 88
indent-width = 4

[tool.ruff.format]
indent-style         = "space"
quote-style          = "double"
line-ending          = "auto"
skip-magic-trailing-comma = false
docstring-code-line-length = "dynamic"
docstring-code-format = false

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "COM812",  # missing-trailing-comma (conflicts with formatter)
  "D203",    # incorrect-blank-line-before-class (conflicts with D211)
  "D213",    # multi-line-summary-second-line (conflicts with D212)
]
fixable   = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["ANN201", "D", "E402", "INP001", "S101"]
"**/__init__.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts   = "--tb=short --color=yes"

[tool.coverage.run]
relative_files = true
source = ["packages"]

[tool.pyproject-fmt]
table_format    = "long"
collapse_tables = ["project.authors"]
